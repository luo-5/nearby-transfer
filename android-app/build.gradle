plugins {
    id 'com.android.application'
}

android {
    namespace 'io.github.nearbytransfer.android'
    compileSdk 35

    defaultConfig {
        applicationId 'io.github.nearbytransfer.android'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'org.bouncycastle:bcprov-jdk18on:1.77'
}
